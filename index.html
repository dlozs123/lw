<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>角色图库预览 - 修复版</title>
    <style>
        :root { --primary-color: #007bff; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg-color); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 240px; background: #fff; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #eee; font-weight: bold; }
        #chara-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chara-item { padding: 10px; cursor: pointer; border-radius: 6px; margin-bottom: 4px; font-size: 14px; }
        .chara-item.active { background: var(--primary-color); color: #fff; }
        #main { flex: 1; overflow-y: auto; padding: 30px; }
        .chara-title { font-size: 24px; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .section-group { margin-bottom: 40px; }
        .section-title { font-size: 18px; color: #666; margin-bottom: 15px; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .img-card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        img { max-width: 100%; height: auto; border-radius: 4px; background: #eee; }
        .img-info { margin-top: 8px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">角色列表</div>
    <div id="chara-list">加载中...</div>
</div>

<div id="main">
    <h1 class="chara-title">请选择角色</h1>
    <div id="gallery-body"></div>
</div>

<script>
    const R2_DOMAIN = "https://p2.dlozs.top/";
    let charaData = {};

    fetch('chara_mapping.json')
        .then(res => res.json())
        .then(data => { charaData = data; initSidebar(); });

    function initSidebar() {
        const listEl = document.getElementById('chara-list');
        listEl.innerHTML = "";
        Object.keys(charaData).sort().forEach(name => {
            const div = document.createElement('div');
            div.className = 'chara-item';
            div.innerText = name;
            div.onclick = () => renderGallery(name, div);
            listEl.appendChild(div);
        });
    }

    // --- 核心修复：URL 构建逻辑 ---
    function getCleanUrl(imgName) {
        // 1. 预处理：全角转半角
        let name = imgName.replace(/＞/g, ">").replace(/＜/g, "<");
        name = name.replace(/\.[^.]+$/, '.webp');
        
        // 2. 编码处理：
        // 使用 encodeURI 对中文进行编码，它会保留 #, >, < 等符号
        // 然后我们再手动把那些 R2 不喜欢的符号换掉，避免双重编码
        let encoded = encodeURI(name);
        
        // 3. 针对 R2 的特殊字符物理映射进行最终替换
        // 确保 # 变成 %23，> 变成 %3E
        return R2_DOMAIN + encoded
            .replace(/#/g, "%23")
            .replace(/>/g, "%3E")
            .replace(/</g, "%3C");
    }

    function renderGallery(name, el) {
        document.querySelectorAll('.chara-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.querySelector('.chara-title').innerText = name;

        const body = document.getElementById('gallery-body');
        body.innerHTML = "";

        const files = charaData[name] || [];
        
        // --- 核心修复：分类正则 ---
        // 逻辑：以 [任意字母][数字] 开头，或者 [任意字母][任意字母][数字] 开头
        // 比如 L1, A6, Cf1, Ff11 全部都能匹配到
        const isSerial = (f) => /^[A-Za-z]{1,2}\d+/.test(f);

        const serials = files.filter(f => isSerial(f));
        const skins = files.filter(f => !isSerial(f));

        createSection("编号卡片", serials);
        createSection("皮肤服装", skins);
    }

    function createSection(title, list) {
        if (list.length === 0) return;
        const container = document.getElementById('gallery-body');
        const section = document.createElement('div');
        section.className = 'section-group';
        section.innerHTML = `<div class="section-title">${title} (${list.length})</div>`;

        list.forEach(imgName => {
            const card = document.createElement('div');
            card.className = 'img-card';
            const finalUrl = getCleanUrl(imgName);
            
            card.innerHTML = `
                <img src="${finalUrl}" loading="lazy" onerror="console.error('Failed:', this.src)">
                <div class="img-info">${imgName}</div>
            `;
            section.appendChild(card);
        });
        container.appendChild(section);
    }
</script>
</body>
</html>
